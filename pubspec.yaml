name: dustman
description: A safe, visual disk cleaner for Windows desktop.
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # Windows 平台桥接
  win32: ^5.5.4
  ffi: ^2.1.3

  # 路径处理
  path: ^1.9.0

  # 重复文件检测：SHA1 / MD5
  crypto: ^3.0.3

  # 偏好持久化（主题）
  shared_preferences: ^2.3.2

  # 窗口控制（最小尺寸、记忆位置）
  window_manager: ^0.4.2

  # FileClaw（Pro）：与 dustman-cloud 通信。社区版编译期 tree-shake 不会引用。
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  file: ^7.0.0  # MemoryFileSystem，用于 Scanner 单元测试

flutter:
  uses-material-design: true
